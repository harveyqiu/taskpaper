<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TaskPaper Lite</title>
  <style>
    /* === A: CSS 自定义属性 + 暗色模式 === */
    :root {
      --bg:           #ffffff;
      --bg-toolbar:   #f5f5f5;
      --bg-input:     #ffffff;
      --fg:           #1a1a1a;
      --fg-muted:     #777777;
      --fg-done:      #aaaaaa;
      --accent:       #0066cc;
      --highlight:    rgba(255, 215, 0, 0.55);
      --border:       #e0e0e0;
      --btn-bg:       #ffffff;
      --btn-fg:       #444444;
      --btn-active-bg:#0066cc;
      --btn-active-fg:#ffffff;
      --font-editor:  'JetBrains Mono', 'Fira Mono', 'Cascadia Code', 'Consolas', 'Menlo', monospace;
      --font-ui:      system-ui, -apple-system, 'Segoe UI', sans-serif;
      --toolbar-h:    46px;
      --line-height:  1.7;
      --font-size:    14px;
      --indent-guide:  rgba(128, 128, 128, 0.13);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:           #1e1e1e;
        --bg-toolbar:   #252525;
        --bg-input:     #2a2a2a;
        --fg:           #d4d4d4;
        --fg-muted:     #666666;
        --fg-done:      #555555;
        --accent:       #4dabf7;
        --highlight:    rgba(255, 210, 0, 0.28);
        --border:       #3a3a3a;
        --btn-bg:       #2a2a2a;
        --btn-fg:       #aaaaaa;
        --btn-active-bg:#4dabf7;
        --btn-active-fg:#1e1e1e;
      }
    }

    /* === B: Reset / Base === */
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
    }

    /* === C: 布局 === */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #toolbar {
      flex-shrink: 0;
      height: var(--toolbar-h);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      background: var(--bg-toolbar);
      border-bottom: 1px solid var(--border);
      font-family: var(--font-ui);
      overflow-x: auto;
      overflow-y: hidden;
    }
    #toolbar::-webkit-scrollbar { display: none; }

    #editor-container {
      position: relative;
      flex: 1;
      overflow: hidden;
      min-width: 0;
    }

    /* === D: 编辑器 === */
    #editor {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: 24px 32px 48px;
      font-family: var(--font-editor);
      font-size: var(--font-size);
      line-height: var(--line-height);
      white-space: pre-wrap;
      word-break: break-word;
      outline: none;
      background-color: transparent;
      background-image: repeating-linear-gradient(
        to right,
        transparent,
        transparent calc(var(--tab-px, 28px) - 1px),
        var(--indent-guide) calc(var(--tab-px, 28px) - 1px),
        var(--indent-guide) var(--tab-px, 28px)
      );
      background-position: 32px 0;
      background-size: var(--max-indent-px, 0px) 100%;
      background-repeat: no-repeat;
      color: var(--fg);
      caret-color: var(--accent);
      tab-size: 4;
    }
    #editor::-webkit-scrollbar { width: 6px; }
    #editor::-webkit-scrollbar-track { background: transparent; }
    #editor::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Each line is a <div> child of #editor */
    #editor > div {
      min-height: calc(var(--font-size) * var(--line-height));
    }
    #editor > div.line-project {
      font-weight: 700;
      color: var(--fg);
      margin-top: 0.4em;
    }
    #editor > div.line-project:first-child {
      margin-top: 0;
    }
    #editor > div.line-task {
      color: var(--fg);
    }
    #editor > div.line-task-done {
      color: var(--fg-done);
      text-decoration: line-through;
      text-decoration-color: var(--fg-done);
    }
    #editor > div.line-project-done {
      font-weight: 700;
      color: var(--fg-done);
      text-decoration: line-through;
      text-decoration-color: var(--fg-done);
      margin-top: 0.4em;
    }
    #editor > div.line-project-done:first-child {
      margin-top: 0;
    }
    #editor > div.line-note {
      color: var(--fg-muted);
      font-style: italic;
    }
    #editor > div.line-note-done {
      color: var(--fg-done);
      text-decoration: line-through;
      text-decoration-color: var(--fg-done);
      font-style: italic;
    }
    #editor > div.line-blank {
      color: var(--fg);
    }
    #editor > div.line-blank-done {
      color: var(--fg-done);
      text-decoration: line-through;
      text-decoration-color: var(--fg-done);
    }
    /* Deeper indentation levels (3+) get muted */
    #editor > div[data-indent="3"],
    #editor > div[data-indent="4"],
    #editor > div[data-indent="5"],
    #editor > div[data-indent="6"],
    #editor > div[data-indent="7"],
    #editor > div[data-indent="8"],
    #editor > div[data-indent="9"] { color: var(--fg-muted); }
    /* Done lines keep their done color regardless of indent */
    #editor > div.line-task-done,
    #editor > div.line-note-done,
    #editor > div.line-project-done,
    #editor > div.line-blank-done { color: var(--fg-done) !important; }
    /* tag colors injected dynamically via #tag-color-styles */
    #editor > div.line-hidden {
      display: none !important;
    }

    /* === tag color dot on filter buttons === */
    .tag-color-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
      flex-shrink: 0;
    }

    /* === Tag color picker popover === */
    #tag-color-picker {
      position: fixed;
      background: var(--bg-toolbar);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      z-index: 9999;
      font-family: var(--font-ui);
      font-size: 12px;
      min-width: 180px;
    }
    .tcp-title {
      font-weight: 600;
      color: var(--fg);
      font-size: 12px;
    }
    .tcp-swatches {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }
    .tcp-swatch {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .tcp-swatch:hover { transform: scale(1.2); }
    .tcp-swatch.selected { border-color: var(--fg); }
    .tcp-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--fg-muted);
    }
    .tcp-row input[type="color"] {
      width: 28px; height: 28px;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px;
      cursor: pointer;
      background: none;
    }
    .tcp-clear {
      height: 24px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: none;
      color: var(--fg-muted);
      font-family: var(--font-ui);
      font-size: 12px;
      cursor: pointer;
      text-align: center;
    }
    .tcp-clear:hover { color: var(--fg); border-color: var(--fg-muted); }

    /* === E: 高亮 Overlay === */
    #highlight-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .hl-rect {
      position: absolute;
      background: var(--highlight);
      border-radius: 2px;
    }
    .hl-current {
      background: rgba(255, 140, 0, 0.65);
      outline: 1px solid rgba(220, 100, 0, 0.85);
    }
    @media (prefers-color-scheme: dark) {
      .hl-current {
        background: rgba(255, 160, 0, 0.5);
        outline: 1px solid rgba(255, 130, 0, 0.8);
      }
    }

    /* === F: 工具栏元素 === */
    #search-wrapper {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    #search-input {
      width: 200px;
      height: 28px;
      padding: 0 8px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--bg-input);
      color: var(--fg);
      font-family: var(--font-ui);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    #search-input:focus {
      border-color: var(--accent);
    }
    #match-count {
      font-size: 11px;
      color: var(--fg-muted);
      white-space: nowrap;
      min-width: 48px;
    }
    #search-clear {
      width: 22px; height: 22px;
      border: none; background: none;
      color: var(--fg-muted);
      font-size: 13px;
      cursor: pointer;
      border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      padding: 0; line-height: 1;
    }
    #search-clear:hover { color: var(--fg); background: var(--border); }
    .search-nav-btn {
      width: 22px; height: 22px;
      border: none; background: none;
      color: var(--fg-muted);
      font-size: 13px;
      cursor: pointer;
      border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      padding: 0; line-height: 1;
    }
    .search-nav-btn:hover:not(:disabled) { color: var(--fg); background: var(--border); }
    .search-nav-btn:disabled { opacity: 0.3; cursor: default; }

    #toolbar-sep {
      width: 1px; height: 20px;
      background: var(--border);
      flex-shrink: 0;
    }

    #filter-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: nowrap;
    }
    .filter-btn {
      height: 26px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: 13px;
      background: var(--btn-bg);
      color: var(--btn-fg);
      font-family: var(--font-ui);
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
      flex-shrink: 0;
    }
    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .filter-btn.active {
      background: var(--btn-active-bg);
      color: var(--btn-active-fg);
      border-color: var(--btn-active-bg);
    }
  </style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <div id="search-wrapper">
      <input id="search-input" type="text" placeholder="搜索… (Cmd+F)" autocomplete="off" autocorrect="off" spellcheck="false">
      <span id="match-count"></span>
      <button id="search-prev" class="search-nav-btn" title="上一个 (Shift+Enter)" disabled>↑</button>
      <button id="search-next" class="search-nav-btn" title="下一个 (Enter)" disabled>↓</button>
      <button id="search-clear" title="清空搜索 (Esc)">✕</button>
    </div>
    <div id="toolbar-sep"></div>
    <div id="filter-bar">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="undone">未完成</button>
      <button class="filter-btn" data-filter="done">已完成</button>
    </div>
    <div id="toolbar-sep2"></div>
    <button id="btn-export" class="filter-btn" title="导出 .taskpaper 文件">导出</button>
    <button id="btn-import" class="filter-btn" title="导入 .taskpaper 文件">导入</button>
    <input id="file-input" type="file" accept=".taskpaper,.txt" style="display:none">
  </div>
  <div id="editor-container">
    <div id="editor"
         contenteditable="true"
         spellcheck="false"
         autocorrect="off"
         autocapitalize="off"
         data-gramm="false"
         data-gramm_editor="false"></div>
    <div id="highlight-overlay" aria-hidden="true"></div>
  </div>
</div>
<script>
'use strict';

// ============================================================
// 1. 常量 & DEFAULT_CONTENT
// ============================================================
const STORAGE_CONTENT    = 'taskpaper-lite:content';
const STORAGE_FILTER     = 'taskpaper-lite:filter';
const STORAGE_TAG_COLORS = 'taskpaper-lite:tag-colors';

const DEFAULT_CONTENT =
`工作:
\t- 写需求文档 @work @today
\t- 发会议邮件 @work @done
\t- 整理项目文档 @work
\t备注：本周重点推进需求评审

个人:
\t- 买菜 @home @today
\t- 读书 30 分钟 @home
\t- 健身 @home @done

`;

// ============================================================
// 2. State
// ============================================================
const State = {
  filter:      'all',
  searchQuery: '',
  tags:        [],       // extracted @tag names (excluding @done)
  tagColors:   {},       // { tagName: cssColor } e.g. { p0: '#e03535' }
  matches:     [],       // search match positions [{textNode, start, end}]
  matchIndex:  -1,       // current highlighted match (-1 = none)
  saveTimer:   null,
  hlTimer:     null,
  isComposing: false,
};

// ============================================================
// 3. DOM 引用
// ============================================================
const editor     = document.getElementById('editor');
const overlay    = document.getElementById('highlight-overlay');
const searchInput = document.getElementById('search-input');
const matchCount = document.getElementById('match-count');
const filterBar  = document.getElementById('filter-bar');

// ============================================================
// 3b. MutationObserver — bare-node detection for normalizeEditorStructure
// ============================================================
let _hasBareNodes = false;
const _structureObserver = new MutationObserver((mutations) => {
  for (const m of mutations) {
    for (const n of m.addedNodes) {
      if (n.nodeType === 3 || n.nodeName === 'BR') { _hasBareNodes = true; return; }
    }
  }
});
_structureObserver.observe(editor, { childList: true });

// ============================================================
// 4. 工具函数
// ============================================================
function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// Get the direct <div> child of #editor that contains a given node.
function getLineDivFromNode(node) {
  if (!node) return null;
  let n = (node.nodeType === 3) ? node.parentElement : node;
  while (n && n.parentElement !== editor) {
    n = n.parentElement;
  }
  return (n && n.parentElement === editor) ? n : null;
}

// Get the first text node inside a div (create one if needed).
function getTextNode(div) {
  for (let c = div.firstChild; c; c = c.nextSibling) {
    if (c.nodeType === 3) return c;
  }
  return null;
}

// ============================================================
// 5. 解析器
// ============================================================
function classifyLine(text) {
  if (text === '' || text === '\u200B') return 'blank';
  const isDone = /(?:^|\s)@done(?:\s|$)/.test(text);
  // Project: no leading whitespace, ends with ':' (optionally followed by @done)
  if (/^[^\t \n].*:(\s*@done)?\s*$/.test(text)) {
    return isDone ? 'project-done' : 'project';
  }
  // Task: leading tab/4-spaces then '- '
  if (/^(\t|    )- /.test(text)) {
    return isDone ? 'task-done' : 'task';
  }
  // Note: any other leading whitespace
  if (/^[\t ]/.test(text)) {
    return isDone ? 'note-done' : 'note';
  }
  // Top-level text (not a project)
  return isDone ? 'blank-done' : 'blank';
}

function extractTags(text) {
  const tags = new Set();
  const re = /(?:^|[\s])(@(?!done\b)[a-zA-Z0-9_\u4e00-\u9fa5-]+)/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    tags.add(m[1]);
  }
  return Array.from(tags).sort();
}

// Extract tag names (without @) for data-ptags attribute used by CSS coloring
function extractTagNames(text) {
  const names = [];
  const re = /(?:^|[\s])@((?!done\b)[a-zA-Z0-9_\u4e00-\u9fa5-]+)/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    names.push(m[1]);
  }
  return names;
}

// ============================================================
// 5b. 标签颜色
// ============================================================
const TAG_COLOR_PRESETS = ['#e03535','#f97316','#eab308','#22c55e','#3b82f6','#a855f7','#ec4899','#64748b'];

// <style> element for dynamic tag color rules (created in DOMContentLoaded)
let tagColorStyle;

function loadTagColors() {
  try {
    const stored = localStorage.getItem(STORAGE_TAG_COLORS);
    State.tagColors = stored ? JSON.parse(stored) : { p0: '#e03535' };
  } catch (e) {
    State.tagColors = { p0: '#e03535' };
  }
}

function saveTagColors() {
  localStorage.setItem(STORAGE_TAG_COLORS, JSON.stringify(State.tagColors));
}

function applyTagColorStyles() {
  if (!tagColorStyle) return;
  const notDone = ':not(.line-task-done):not(.line-note-done):not(.line-project-done):not(.line-blank-done)';
  const rules = Object.entries(State.tagColors).map(([tag, color]) =>
    `#editor > div[data-ptags~="${tag}"]${notDone} { color: ${color} !important; }`
  );
  tagColorStyle.textContent = rules.join('\n');
}

function setTagColor(tagName, color) {
  if (color) State.tagColors[tagName] = color;
  else delete State.tagColors[tagName];
  saveTagColors();
  applyTagColorStyles();
  renderTagButtons(State.tags);
}

function showTagColorPicker(tagName, anchorBtn) {
  document.getElementById('tag-color-picker')?.remove();
  const currentColor = State.tagColors[tagName] || '';
  const picker = document.createElement('div');
  picker.id = 'tag-color-picker';

  const title = document.createElement('div');
  title.className = 'tcp-title';
  title.textContent = '@' + tagName + ' 颜色';
  picker.appendChild(title);

  const swatches = document.createElement('div');
  swatches.className = 'tcp-swatches';
  for (const c of TAG_COLOR_PRESETS) {
    const s = document.createElement('div');
    s.className = 'tcp-swatch' + (currentColor === c ? ' selected' : '');
    s.style.background = c;
    s.title = c;
    s.addEventListener('click', (e) => { e.stopPropagation(); setTagColor(tagName, c); picker.remove(); });
    swatches.appendChild(s);
  }
  picker.appendChild(swatches);

  const row = document.createElement('div');
  row.className = 'tcp-row';
  const colorInput = document.createElement('input');
  colorInput.type = 'color';
  colorInput.value = currentColor || '#e03535';
  colorInput.title = '自定义颜色';
  colorInput.addEventListener('change', (e) => { e.stopPropagation(); setTagColor(tagName, colorInput.value); picker.remove(); });
  const lbl = document.createElement('span');
  lbl.textContent = '自定义颜色';
  row.appendChild(colorInput);
  row.appendChild(lbl);
  picker.appendChild(row);

  const clearBtn = document.createElement('button');
  clearBtn.className = 'tcp-clear';
  clearBtn.textContent = '清除颜色';
  clearBtn.addEventListener('click', (e) => { e.stopPropagation(); setTagColor(tagName, null); picker.remove(); });
  picker.appendChild(clearBtn);

  document.body.appendChild(picker);
  const rect = anchorBtn.getBoundingClientRect();
  picker.style.top  = (rect.bottom + 4) + 'px';
  picker.style.left = rect.left + 'px';
  // Clamp to viewport
  requestAnimationFrame(() => {
    const pr = picker.getBoundingClientRect();
    if (pr.right > window.innerWidth - 8)
      picker.style.left = (window.innerWidth - pr.width - 8) + 'px';
  });
  setTimeout(() => document.addEventListener('click', () => picker.remove(), { once: true }), 0);
}

// ============================================================
// 6. 结构规范化
// ============================================================
function normalizeEditorStructure() {
  // Only wrap bare text nodes / BRs when the MutationObserver detected them
  if (_hasBareNodes) {
    _hasBareNodes = false;
    for (const node of Array.from(editor.childNodes)) {
      if (node.nodeType === 3 || node.nodeName === 'BR') {
        const div = document.createElement('div');
        editor.insertBefore(div, node);
        div.appendChild(node);
      }
    }
  }
  // Ensure empty divs have a <br> placeholder (lightweight O(n) check)
  for (const div of editor.children) {
    if (div.textContent === '' && !div.querySelector('br')) {
      div.innerHTML = '<br>';
    }
  }
}

// ============================================================
// 7. DOM 同步：仅更新 className，不碰 textContent/innerHTML
// ============================================================
function getEditorLines() {
  return Array.from(editor.children).map(d => d.textContent);
}

function getPlainText() {
  return getEditorLines().join('\n');
}

function syncEditorClasses() {
  normalizeEditorStructure();
  for (const div of editor.children) {
    const type  = classifyLine(div.textContent);
    const cls   = 'line-' + type;
    if (div.className.replace(' line-hidden', '') !== cls) {
      const hidden = div.classList.contains('line-hidden');
      div.className = cls + (hidden ? ' line-hidden' : '');
    }
    const ptags = extractTagNames(div.textContent);
    if (ptags.length > 0) div.dataset.ptags = ptags.join(' ');
    else delete div.dataset.ptags;
  }
  updateIndentGuides();
}

// ============================================================
// 8. 存储
// ============================================================
function loadContentIntoEditor(text) {
  const lines = text.split('\n');
  // Remove trailing empty line if last line is empty
  while (lines.length > 1 && lines[lines.length - 1] === '') lines.pop();
  editor.innerHTML = lines
    .map(line => {
      const cls = 'line-' + classifyLine(line);
      const content = escapeHtml(line);
      const ptags = extractTagNames(line);
      const ptagAttr = ptags.length > 0 ? ` data-ptags="${ptags.join(' ')}"` : '';
      return `<div class="${cls}"${ptagAttr}>${content || '<br>'}</div>`;
    })
    .join('');
}

function loadFromStorage() {
  const content = localStorage.getItem(STORAGE_CONTENT) || DEFAULT_CONTENT;
  const filter  = localStorage.getItem(STORAGE_FILTER)  || 'all';
  State.filter  = filter;
  loadContentIntoEditor(content);
  // Update filter buttons
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === filter);
  });
  // Extract and render tag buttons
  State.tags = extractTags(content);
  renderTagButtons(State.tags);
  applyFilter();
}

function saveToStorage() {
  const text = getPlainText();
  localStorage.setItem(STORAGE_CONTENT, text);
  // Refresh tag buttons if tags changed
  const newTags = extractTags(text);
  if (JSON.stringify(newTags) !== JSON.stringify(State.tags)) {
    State.tags = newTags;
    renderTagButtons(newTags);
  }
}

function scheduleAutoSave() {
  clearTimeout(State.saveTimer);
  State.saveTimer = setTimeout(saveToStorage, 500);
}

// ============================================================
// 9. 筛选
// ============================================================
function applyFilter() {
  const filter = State.filter;
  for (const div of editor.children) {
    const baseClass = div.className.replace(' line-hidden', '').trim();
    let hide = false;
    const isProject = baseClass === 'line-project' || baseClass === 'line-project-done';
    if (isProject) {
      hide = false;
    } else if (filter === 'all') {
      hide = false;
    } else if (filter === 'undone') {
      hide = baseClass.endsWith('-done');
    } else if (filter === 'done') {
      hide = !baseClass.endsWith('-done');
    } else {
      // @tag filter: word-boundary regex to avoid partial matches (@work ≠ @working)
      const text = div.textContent;
      const tagRe = new RegExp('(?:^|\\s)' + filter.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '(?:\\s|$)');
      hide = !tagRe.test(text);
    }
    if (hide) div.classList.add('line-hidden');
    else      div.classList.remove('line-hidden');
  }
}

function renderTagButtons(tags) {
  // Remove old dynamic tag buttons
  document.querySelectorAll('.filter-btn[data-tag]').forEach(b => b.remove());
  // Add new ones
  for (const tag of tags) {
    const tagName = tag.replace(/^@/, '');
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (State.filter === tag ? ' active' : '');
    btn.dataset.filter = tag;
    btn.dataset.tag    = tag;
    btn.title = '右键设置颜色';
    const color = State.tagColors[tagName];
    if (color) {
      const dot = document.createElement('span');
      dot.className = 'tag-color-dot';
      dot.style.background = color;
      btn.appendChild(dot);
    }
    btn.appendChild(document.createTextNode(tag));
    btn.addEventListener('contextmenu', (e) => { e.preventDefault(); showTagColorPicker(tagName, btn); });
    filterBar.appendChild(btn);
  }
}

// ============================================================
// 10. 搜索高亮 Overlay
// ============================================================
let _scrollingToMatch = false;

function renderHighlights() {
  overlay.innerHTML = '';
  const query = State.searchQuery.trim();
  if (!query) {
    State.matches   = [];
    State.matchIndex = -1;
    matchCount.textContent = '';
    _updateNavButtons();
    return;
  }

  const lowerQuery = query.toLowerCase();
  const queryLen   = query.length;

  // Build match list
  const newMatches = [];
  for (const div of editor.children) {
    if (div.classList.contains('line-hidden')) continue;
    const textNode = getTextNode(div);
    if (!textNode) continue;
    const lowerText = textNode.textContent.toLowerCase();
    let idx = 0;
    while ((idx = lowerText.indexOf(lowerQuery, idx)) !== -1) {
      newMatches.push({ textNode, start: idx, end: idx + queryLen });
      idx += queryLen;
    }
  }
  State.matches = newMatches;

  // Clamp or reset matchIndex
  if (newMatches.length === 0) {
    State.matchIndex = -1;
  } else if (State.matchIndex < 0 || State.matchIndex >= newMatches.length) {
    State.matchIndex = 0;
  }

  // Scroll current match into view BEFORE computing overlay positions
  if (State.matchIndex >= 0) _scrollToMatch();

  // Render overlay using (possibly updated) scroll position
  const editorRect = editor.getBoundingClientRect();
  const scrollTop  = editor.scrollTop;
  const scrollLeft = editor.scrollLeft;
  const range = document.createRange();
  const frag  = document.createDocumentFragment();

  for (let i = 0; i < newMatches.length; i++) {
    const m = newMatches[i];
    try {
      range.setStart(m.textNode, m.start);
      range.setEnd(m.textNode, m.end);
      const rects = range.getClientRects();
      for (const r of rects) {
        const el = document.createElement('div');
        el.className = i === State.matchIndex ? 'hl-rect hl-current' : 'hl-rect';
        el.style.top    = (r.top  - editorRect.top  + scrollTop)  + 'px';
        el.style.left   = (r.left - editorRect.left + scrollLeft) + 'px';
        el.style.width  = r.width  + 'px';
        el.style.height = r.height + 'px';
        frag.appendChild(el);
      }
    } catch (e) { /* skip */ }
  }

  overlay.appendChild(frag);
  const total = newMatches.length;
  matchCount.textContent = total === 0 ? '无匹配' : `${State.matchIndex + 1}/${total}`;
  _updateNavButtons();
}

function _scrollToMatch() {
  const m = State.matches[State.matchIndex];
  if (!m) return;
  try {
    const range = document.createRange();
    range.setStart(m.textNode, m.start);
    range.setEnd(m.textNode, m.end);
    const rect       = range.getBoundingClientRect();
    const editorRect = editor.getBoundingClientRect();
    const topRel     = rect.top    - editorRect.top  + editor.scrollTop;
    const bottomRel  = rect.bottom - editorRect.top  + editor.scrollTop;
    const margin     = 60;
    if (topRel - margin < editor.scrollTop) {
      _scrollingToMatch = true;
      editor.scrollTop = Math.max(0, topRel - margin);
    } else if (bottomRel + margin > editor.scrollTop + editor.clientHeight) {
      _scrollingToMatch = true;
      editor.scrollTop = bottomRel + margin - editor.clientHeight;
    }
  } catch (e) {}
}

function navigateMatch(dir) {
  if (!State.matches.length) return;
  if (State.matchIndex < 0) {
    State.matchIndex = dir > 0 ? 0 : State.matches.length - 1;
  } else {
    State.matchIndex = (State.matchIndex + dir + State.matches.length) % State.matches.length;
  }
  renderHighlights();
}

function _updateNavButtons() {
  const has = State.matches.length > 0;
  document.getElementById('search-prev').disabled = !has;
  document.getElementById('search-next').disabled = !has;
}

function scheduleHighlights() {
  if (State.hlTimer) cancelAnimationFrame(State.hlTimer);
  State.hlTimer = requestAnimationFrame(renderHighlights);
}

// ============================================================
// 11. Cmd+D 切换完成状态
// ============================================================
function toggleDoneOnCurrentLine() {
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount) return;
  const range   = sel.getRangeAt(0);
  const lineDiv = getLineDivFromNode(range.startContainer);
  if (!lineDiv) return;

  const text = lineDiv.textContent;
  if (!text || text === '\u200B') return;

  const hasDone = /(?:^|\s)@done(?:\s|$)/.test(text);
  let newText;
  if (hasDone) {
    newText = text.replace(/\s*@done/, '');
  } else {
    newText = text.trimEnd() + ' @done';
  }

  // Save cursor offset within this div's text node
  const textNode = getTextNode(lineDiv);
  const cursorOffset = (textNode && range.startContainer === textNode)
    ? range.startOffset
    : Math.min(range.startOffset, newText.length);

  // Replace content via execCommand to preserve undo history
  const replaceRange = document.createRange();
  if (textNode) {
    replaceRange.setStart(textNode, 0);
    replaceRange.setEnd(textNode, textNode.length);
  } else {
    replaceRange.selectNodeContents(lineDiv);
  }
  sel.removeAllRanges();
  sel.addRange(replaceRange);
  document.execCommand('insertText', false, newText || '\u200B');

  // Restore cursor position
  const newTextNode = getTextNode(lineDiv);
  if (newTextNode) {
    const clampedOffset = Math.min(cursorOffset, newTextNode.length);
    const newRange = document.createRange();
    newRange.setStart(newTextNode, clampedOffset);
    newRange.collapse(true);
    sel.removeAllRanges();
    sel.addRange(newRange);
  }

  syncEditorClasses();
  applyFilter();
  scheduleAutoSave();
  if (State.searchQuery) scheduleHighlights();
}

// ============================================================
// 12. 事件绑定
// ============================================================

// IME composition guard
editor.addEventListener('compositionstart', () => { State.isComposing = true; });
editor.addEventListener('compositionend',   () => {
  State.isComposing = false;
  syncEditorClasses();
  applyFilter();
  scheduleAutoSave();
  if (State.searchQuery) scheduleHighlights();
});

// Input
editor.addEventListener('input', () => {
  if (State.isComposing) return;
  syncEditorClasses();
  applyFilter();
  scheduleAutoSave();
  if (State.searchQuery) scheduleHighlights();
});

// Paste: strip rich text, insert plain text
editor.addEventListener('paste', (e) => {
  e.preventDefault();
  const text = e.clipboardData ? e.clipboardData.getData('text/plain') : '';
  if (text) {
    document.execCommand('insertText', false, text);
  }
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  const mod = e.metaKey || e.ctrlKey;

  // Cmd+F → focus search
  if (mod && e.key === 'f') {
    e.preventDefault();
    searchInput.focus();
    searchInput.select();
    return;
  }

  // Cmd+D → toggle done
  if (mod && e.key === 'd') {
    e.preventDefault();
    toggleDoneOnCurrentLine();
    return;
  }
});

// Tab / Shift+Tab in editor
editor.addEventListener('keydown', (e) => {
  if (e.key !== 'Tab') return;
  e.preventDefault();

  const sel = window.getSelection();
  if (!sel || !sel.rangeCount) return;
  const range    = sel.getRangeAt(0);
  const startDiv = getLineDivFromNode(range.startContainer);
  const endDiv   = getLineDivFromNode(range.endContainer);
  if (!startDiv) return;

  const isMultiLine = !range.collapsed && startDiv !== endDiv;

  if (!isMultiLine) {
    if (!e.shiftKey) {
      // Single cursor Tab: insert tab character (undoable)
      document.execCommand('insertText', false, '\t');
      syncEditorClasses();
      scheduleAutoSave();
      return;
    }
    // Shift+Tab single line: delete leading indent via execCommand (undoable)
    const textNode = getTextNode(startDiv);
    if (!textNode) return;
    const text = textNode.textContent;
    let removed;
    if      (text.startsWith('\t'))   removed = 1;
    else if (text.startsWith('    ')) removed = 4;
    else return;

    const offset = range.startContainer === textNode ? range.startOffset : 0;
    const delRange = document.createRange();
    delRange.setStart(textNode, 0);
    delRange.setEnd(textNode, removed);
    sel.removeAllRanges();
    sel.addRange(delRange);
    document.execCommand('delete', false);

    const newTn = getTextNode(startDiv);
    if (newTn) {
      const pos = Math.max(0, offset - removed);
      const r = document.createRange();
      r.setStart(newTn, Math.min(pos, newTn.length));
      r.collapse(true);
      sel.removeAllRanges();
      sel.addRange(r);
    }
    syncEditorClasses();
    scheduleAutoSave();
    return;
  }

  // Multi-line Tab / Shift+Tab
  const children = Array.from(editor.children);
  const startIdx = children.indexOf(startDiv);
  const endIdx   = children.indexOf(endDiv);
  if (startIdx < 0 || endIdx < 0) return;

  const affected = children.slice(startIdx, endIdx + 1);
  for (const div of affected) {
    const text = div.textContent;
    let newText;
    if (!e.shiftKey) {
      newText = '\t' + text;
    } else {
      if      (text.startsWith('\t'))   newText = text.slice(1);
      else if (text.startsWith('    ')) newText = text.slice(4);
      else                               newText = text;
    }
    if (newText !== text) {
      div.textContent = newText || '';
      if (!newText) div.innerHTML = '<br>';
    }
  }

  // Restore selection spanning all affected lines
  const firstTn = getTextNode(affected[0]) || affected[0];
  const lastDiv = affected[affected.length - 1];
  const lastTn  = getTextNode(lastDiv);
  const newSel  = document.createRange();
  newSel.setStart(firstTn, 0);
  if (lastTn) newSel.setEnd(lastTn, lastTn.length);
  else        newSel.selectNodeContents(lastDiv);
  sel.removeAllRanges();
  sel.addRange(newSel);

  syncEditorClasses();
  scheduleAutoSave();
});

// Cmd+] / Cmd+[ → indent / unindent current line(s)
editor.addEventListener('keydown', (e) => {
  if (!(e.metaKey || e.ctrlKey)) return;
  if (e.key !== ']' && e.key !== '[') return;
  e.preventDefault();

  const sel = window.getSelection();
  if (!sel || !sel.rangeCount) return;
  const range    = sel.getRangeAt(0);
  const startDiv = getLineDivFromNode(range.startContainer);
  const endDiv   = getLineDivFromNode(range.endContainer);
  if (!startDiv) return;

  const isIndent    = e.key === ']';
  const isMultiLine = !range.collapsed && startDiv !== endDiv;

  if (!isMultiLine) {
    const textNode = getTextNode(startDiv);
    const text     = startDiv.textContent;
    const offset   = (range.startContainer === textNode) ? range.startOffset : 0;
    if (isIndent) {
      startDiv.textContent = '\t' + text;
      const tn = getTextNode(startDiv);
      if (tn) { const r = document.createRange(); r.setStart(tn, offset + 1); r.collapse(true); sel.removeAllRanges(); sel.addRange(r); }
    } else {
      let removed = 0;
      if      (text.startsWith('\t'))   removed = 1;
      else if (text.startsWith('    ')) removed = 4;
      else return;
      const newText = text.slice(removed);
      startDiv.textContent = newText || '';
      if (!newText) startDiv.innerHTML = '<br>';
      const tn = getTextNode(startDiv);
      if (tn) { const pos = Math.max(0, offset - removed); const r = document.createRange(); r.setStart(tn, Math.min(pos, tn.length)); r.collapse(true); sel.removeAllRanges(); sel.addRange(r); }
    }
    syncEditorClasses();
    scheduleAutoSave();
    return;
  }

  // Multi-line selection
  const children = Array.from(editor.children);
  const startIdx  = children.indexOf(startDiv);
  const endIdx    = children.indexOf(endDiv);
  if (startIdx < 0 || endIdx < 0) return;

  const affected = children.slice(startIdx, endIdx + 1);
  for (const div of affected) {
    const text = div.textContent;
    let newText;
    if (isIndent) {
      newText = '\t' + text;
    } else {
      if      (text.startsWith('\t'))   newText = text.slice(1);
      else if (text.startsWith('    ')) newText = text.slice(4);
      else                               newText = text;
    }
    if (newText !== text) {
      div.textContent = newText || '';
      if (!newText) div.innerHTML = '<br>';
    }
  }

  const firstTn = getTextNode(affected[0]) || affected[0];
  const lastDiv = affected[affected.length - 1];
  const lastTn  = getTextNode(lastDiv);
  const newSel  = document.createRange();
  newSel.setStart(firstTn, 0);
  if (lastTn) newSel.setEnd(lastTn, lastTn.length);
  else        newSel.selectNodeContents(lastDiv);
  sel.removeAllRanges();
  sel.addRange(newSel);

  syncEditorClasses();
  scheduleAutoSave();
});

// Search input
searchInput.addEventListener('input', () => {
  State.searchQuery = searchInput.value;
  scheduleHighlights();
});

searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    searchInput.value = '';
    State.searchQuery = '';
    renderHighlights();
    editor.focus();
    return;
  }
  if (e.key === 'Enter') {
    e.preventDefault();
    navigateMatch(e.shiftKey ? -1 : 1);
  }
});

document.getElementById('search-clear').addEventListener('click', () => {
  searchInput.value = '';
  State.searchQuery = '';
  renderHighlights();
  editor.focus();
});

// Filter buttons (event delegation)
filterBar.addEventListener('click', (e) => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  State.filter = btn.dataset.filter;
  localStorage.setItem(STORAGE_FILTER, State.filter);
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
});

// Scroll: re-render highlights (skip if triggered by our own match-scrolling)
editor.addEventListener('scroll', () => {
  if (_scrollingToMatch) { _scrollingToMatch = false; return; }
  if (State.searchQuery) scheduleHighlights();
});

// Window resize: re-render highlights
window.addEventListener('resize', () => {
  if (State.searchQuery) scheduleHighlights();
  updateTabWidth();
});

function updateTabWidth() {
  const style = getComputedStyle(editor);
  const probe = document.createElement('span');
  probe.style.cssText = `position:absolute;visibility:hidden;white-space:pre;` +
    `font-family:${style.fontFamily};font-size:${style.fontSize};tab-size:4;`;
  probe.textContent = '\t';
  document.body.appendChild(probe);
  const w = probe.getBoundingClientRect().width;
  document.body.removeChild(probe);
  editor.style.setProperty('--tab-px', w + 'px');
  updateIndentGuides();
}

function getIndentLevel(text) {
  let level = 0, i = 0;
  while (i < text.length) {
    if (text[i] === '\t') { level++; i++; }
    else if (text.slice(i, i + 4) === '    ') { level++; i += 4; }
    else break;
  }
  return level;
}

function updateIndentGuides() {
  let maxLevel = 0;
  for (const div of editor.children) {
    const level = getIndentLevel(div.textContent);
    div.dataset.indent = level;
    if (level > maxLevel) maxLevel = level;
  }
  const tabPx = parseFloat(editor.style.getPropertyValue('--tab-px')) || 28;
  editor.style.setProperty('--max-indent-px', (maxLevel * tabPx) + 'px');
}

// ============================================================
// 13. 初始化
// ============================================================
// ============================================================
// 14. 导出 / 导入
// ============================================================
function exportFile() {
  const text = getPlainText();
  const blob = new Blob([text], { type: 'text/plain' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'tasks.taskpaper';
  a.click();
  URL.revokeObjectURL(url);
}

function importFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result;
    loadContentIntoEditor(text);
    localStorage.setItem(STORAGE_CONTENT, text);
    State.tags = extractTags(text);
    renderTagButtons(State.tags);
    applyFilter();
    updateIndentGuides();
    if (State.searchQuery) scheduleHighlights();
  };
  reader.readAsText(file, 'UTF-8');
}

document.addEventListener('DOMContentLoaded', () => {
  // Create dynamic style element for tag colors
  tagColorStyle = document.createElement('style');
  tagColorStyle.id = 'tag-color-styles';
  document.head.appendChild(tagColorStyle);

  loadTagColors();
  applyTagColorStyles();
  updateTabWidth();
  loadFromStorage();
  updateIndentGuides();
  editor.focus();

  document.getElementById('search-prev').addEventListener('click', () => navigateMatch(-1));
  document.getElementById('search-next').addEventListener('click', () => navigateMatch(1));
  document.getElementById('btn-export').addEventListener('click', exportFile);
  document.getElementById('btn-import').addEventListener('click', () => {
    document.getElementById('file-input').click();
  });
  document.getElementById('file-input').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) importFile(file);
    e.target.value = '';
  });
  // Place cursor at end
  const sel = window.getSelection();
  if (sel && editor.lastChild) {
    const range = document.createRange();
    range.selectNodeContents(editor.lastChild);
    range.collapse(false);
    sel.removeAllRanges();
    sel.addRange(range);
  }
});
</script>
